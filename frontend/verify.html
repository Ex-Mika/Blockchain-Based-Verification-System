<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Credential Verification</title>
    <meta
      name="description"
      content="Dedicated phone-friendly page for verifying a scanned Sepolia micro-credential."
    >
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    >
    <link rel="stylesheet" href="./style.css">
    <script src="https://cdn.jsdelivr.net/npm/ethers@6.15.0/dist/ethers.umd.min.js"></script>
    <script type="module" src="./verify.js"></script>
  </head>
  <body class="verification-page">
    <div class="background-glow glow-one"></div>
    <div class="background-glow glow-two"></div>

    <main class="verify-layout" id="credential-verification">
      <!-- Status hero -->
      <section id="verification-status-card" class="verify-status-card is-neutral">
        <div class="verify-status-icon" id="verification-status-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="8" x2="12" y2="12"/>
            <line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
        </div>
        <div class="verify-status-text">
          <p class="verify-status-eyebrow">Verification Status</p>
          <h1 id="verification-status-title">Awaiting credential scan</h1>
          <p id="verification-status-copy" class="verify-status-copy">
            Scan the credential QR on a phone to open this page with the holder, proof, and on-chain root details.
          </p>
          <div id="verification-chip-row" class="verify-chip-row"></div>
        </div>
      </section>

      <p
        id="verification-message"
        class="status-message status-neutral verify-banner"
        data-default-variant="neutral"
        data-default-message="Open this page from a credential QR to verify the embedded Merkle proof and on-chain root."
      >
        Open this page from a credential QR to verify the embedded Merkle proof and on-chain root.
      </p>

      <!-- Detail columns -->
      <div class="verify-detail-columns">

        <article class="verify-card">
          <p class="panel-label">Credential</p>
          <dl id="verification-owner-details" class="detail-list"></dl>
        </article>

        <article class="verify-card">
          <p class="panel-label">Verification</p>
          <dl id="verification-proof-details" class="detail-list"></dl>
        </article>

      </div>
    </main>
  </body>
</html>
